<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>起床场景 Step 2 — 起床入口</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a}

.vp{
  width:393px;height:852px;
  transform-origin:top left;
  position:absolute;top:0;left:0;
  background:#000;
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* 早晨暖光背景 */
.bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(250,204,21,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(251,146,60,0.08) 0%, transparent 50%),
    #07070d;
}

.status-bar{
  position:relative;z-index:2;
  height:54px;
  display:flex;align-items:flex-end;padding:0 24px 8px;
  justify-content:space-between;
  font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);
}
.status-bar .right{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.5)}

.body{
  position:relative;z-index:2;
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:48px;
  padding-bottom:60px;
}

.hero{
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}

.ai-logo{
  width:80px;height:80px;
  border-radius:22px;
  overflow:hidden;
}
.ai-logo img{
  width:100%;height:100%;
  object-fit:contain;
}

.hero-text{
  font-size:36px;
  font-weight:700;
  color:rgba(255,255,255,0.95);
  letter-spacing:1px;
}

.wake-btn{
  display:flex;flex-direction:column;align-items:center;gap:16px;
}

.btn-circle{
  width:88px;height:88px;
  border-radius:50%;
  background:linear-gradient(135deg, #f59e0b, #f97316);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  position:relative;
  transition:transform 0.2s ease;
  font-size:36px;
}
.btn-circle:active{transform:scale(0.93)}

.btn-circle::before{
  content:'';position:absolute;
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg, #f59e0b, #f97316);
  opacity:0.3;
  animation:breathe 2.5s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.25);opacity:0}
}

.btn-label{
  font-size:14px;
  color:rgba(255,255,255,0.3);
  font-weight:400;
  letter-spacing:0.5px;
}

.home-indicator{
  position:absolute;bottom:8px;left:0;right:0;
  z-index:2;
  display:flex;justify-content:center;
}
.home-indicator span{
  width:134px;height:5px;border-radius:3px;
  background:rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<div class="vp" id="vp">
  <div class="bg"></div>

  <div class="status-bar">
    <span>7:00</span>
    <div class="right"><span>●●●●○</span><span>WiFi</span><span>92%</span></div>
  </div>

  <div class="body">
    <div class="hero">
      <div class="ai-logo">
        <img src="miclaw-logo.png" alt="MiClaw">
      </div>
      <div class="hero-text">起床</div>
    </div>

    <div class="wake-btn">
      <div class="btn-circle">☀️</div>
      <div class="btn-label">点击开启新一天</div>
    </div>
  </div>

  <div class="home-indicator"><span></span></div>
</div>
<script>
function fit(){
  var vp=document.getElementById('vp');
  var s=Math.min(window.innerWidth/393,window.innerHeight/852);
  vp.style.transform='scale('+s+')';
}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
