<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>睡觉场景 Step 2 — MiClaw 称呼用户</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a}

.vp{
  width:393px;height:852px;
  transform-origin:top left;
  position:absolute;top:0;left:0;
  background:#000;
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  display:flex;flex-direction:column;
  overflow:hidden;
}

.bg-layer{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(139,92,246,0.08) 0%, transparent 50%),
    linear-gradient(180deg, #0c0c14 0%, #0a0a12 100%);
  z-index:0;
}

.status-bar{
  position:relative;z-index:2;
  height:54px;
  display:flex;align-items:flex-end;padding:0 24px 8px;
  justify-content:space-between;
  font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);
}
.status-bar .right{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.5)}

.top-bar{
  position:relative;z-index:2;
  height:52px;
  display:flex;align-items:center;padding:0 20px;
}
.top-bar .hamburger{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;color:rgba(255,255,255,0.5);font-size:18px;
}
.top-bar .title-area{flex:1;text-align:center}
.top-bar .title{font-size:17px;font-weight:600;color:rgba(255,255,255,0.95);letter-spacing:0.3px}
.top-bar .subtitle{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
.top-bar .settings{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;color:rgba(255,255,255,0.5);font-size:16px;
}

/* 消息区 */
.messages{
  position:relative;z-index:2;
  flex:1;overflow-y:auto;
  padding:16px 20px;
  display:flex;flex-direction:column;
  gap:20px;
}

/* 时间标签 */
.time-label{
  text-align:center;
  font-size:11px;color:rgba(255,255,255,0.2);
  padding:4px 0;
}

/* AI 消息 */
.ai-msg{display:flex;flex-direction:column;gap:10px}
.ai-header{display:flex;align-items:center;gap:8px}
.ai-dot{
  width:28px;height:28px;border-radius:9px;
  background:linear-gradient(135deg, rgba(99,102,241,0.4), rgba(139,92,246,0.3));
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.ai-label{font-size:13px;font-weight:500;color:rgba(255,255,255,0.5)}

.ai-bubble{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:4px 18px 18px 18px;
  padding:14px 16px;
  color:rgba(255,255,255,0.88);
  font-size:15px;line-height:1.65;
  font-weight:400;
  max-width:310px;
  backdrop-filter:blur(10px);
}
.ai-bubble .name-highlight{
  color:#a78bfa;
  font-weight:600;
}

/* 引导卡片 — 横向滚动 */
.guide-cards{
  display:flex;gap:10px;
  padding:4px 0;
  overflow-x:auto;
}
.guide-cards::-webkit-scrollbar{display:none}

.guide-card{
  flex-shrink:0;
  padding:12px 16px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:10px;
  cursor:pointer;
}
.guide-card.primary{
  background:linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
  border-color:rgba(99,102,241,0.25);
}
.guide-card .g-icon{font-size:18px}
.guide-card .g-text{
  display:flex;flex-direction:column;gap:1px;
}
.guide-card .g-title{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);white-space:nowrap}
.guide-card .g-desc{font-size:11px;color:rgba(255,255,255,0.3);white-space:nowrap}

/* 用户消息 */
.user-msg{display:flex;justify-content:flex-end}
.user-bubble{
  max-width:260px;
  background:linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
  border:1px solid rgba(99,102,241,0.15);
  border-radius:18px 18px 4px 18px;
  padding:12px 16px;
  color:rgba(255,255,255,0.95);
  font-size:15px;line-height:1.55;
  font-weight:400;
}

/* 底部输入栏 */
.input-bar{
  position:relative;z-index:2;
  padding:12px 20px 36px;
}
.input-container{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:24px;padding:10px 14px;
}
.input-plus{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:rgba(255,255,255,0.3);flex-shrink:0;
}
.input-text{flex:1;font-size:14px;color:rgba(255,255,255,0.25);padding:4px 0}
.input-mic{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:rgba(255,255,255,0.3);flex-shrink:0;
}

.home-indicator{
  position:relative;z-index:2;
  display:flex;justify-content:center;padding-bottom:8px;
}
.home-indicator span{
  width:134px;height:5px;border-radius:3px;
  background:rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<div class="vp" id="vp">
  <div class="bg-layer"></div>

  <div class="status-bar">
    <span>21:36</span>
    <div class="right">
      <span>●●●●○</span>
      <span>WiFi</span>
      <span>87%</span>
    </div>
  </div>

  <div class="top-bar">
    <div class="hamburger">☰</div>
    <div class="title-area">
      <div class="title">Xiaomi MiClaw</div>
      <div class="subtitle">AI 生成内容仅供参考</div>
    </div>
    <div class="settings">⚙</div>
  </div>

  <div class="messages">
    <div class="time-label">— 今天 21:36 —</div>

    <!-- AI 打招呼 -->
    <div class="ai-msg">
      <div class="ai-header">
        <div class="ai-dot">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="ai-label">Xiaomi MiClaw</div>
      </div>
      <div class="ai-bubble">Hello，你好呀 👋<br>你希望我怎么称呼你？</div>
    </div>

    <!-- 用户回复名字 -->
    <div class="user-msg">
      <div class="user-bubble">叫我炜然就好</div>
    </div>

    <!-- AI 称呼用户 + 引导 -->
    <div class="ai-msg">
      <div class="ai-header">
        <div class="ai-dot">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="ai-label">Xiaomi MiClaw</div>
      </div>
      <div class="ai-bubble">好的<span class="name-highlight">炜然</span>，很高兴认识你 ✨<br><br>你可以对我说"现在准备睡觉了"，我来帮你安排一切</div>
      <div class="guide-cards">
        <div class="guide-card primary">
          <div class="g-icon">🌙</div>
          <div class="g-text">
            <div class="g-title">准备睡觉了</div>
            <div class="g-desc">一句话进入睡眠模式</div>
          </div>
        </div>
        <div class="guide-card">
          <div class="g-icon">☀️</div>
          <div class="g-text">
            <div class="g-title">早上好</div>
            <div class="g-desc">唤醒全屋设备</div>
          </div>
        </div>
        <div class="guide-card">
          <div class="g-icon">🚗</div>
          <div class="g-text">
            <div class="g-title">准备出门</div>
            <div class="g-desc">人车家联动</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-container">
      <div class="input-plus">＋</div>
      <div class="input-text">说点什么，或按住说话...</div>
      <div class="input-mic">🎤</div>
    </div>
  </div>
  <div class="home-indicator"><span></span></div>
</div>
<script>
function fit(){
  var vp=document.getElementById('vp');
  var s=Math.min(window.innerWidth/393,window.innerHeight/852);
  vp.style.transform='scale('+s+')';
}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
