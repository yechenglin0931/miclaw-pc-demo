<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiClaw - 小红书发布（主会话）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popoverIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes progressPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
  .animate-spin { animation: spin 1s linear infinite; }
  .animate-fade-in { animation: fadeIn 0.4s ease-out; }
  .animate-slide-up { animation: slideUp 0.5s ease-out; }
  .scrollbar-thin::-webkit-scrollbar { width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
  .glass {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
  }
</style>
</head>
<body class="bg-[#f2f2f2] h-screen overflow-hidden">
<div id="app" class="size-full flex overflow-hidden p-0 md:p-4 gap-0 md:gap-5">

  <!-- Sidebar -->
  <div class="bg-white h-full rounded-none md:rounded-[44px] w-[280px] shrink-0 flex-col p-5 hidden md:flex">
    <div class="flex items-center gap-2 px-3 pt-2 pb-6">
      <div class="size-3 rounded-full bg-[#FF5C60] border border-black/10"></div>
      <div class="size-3 rounded-full bg-[#FAC800] border border-black/10"></div>
      <div class="size-3 rounded-full bg-[#35C759] border border-black/10"></div>
    </div>
    <div class="flex flex-col gap-0.5">
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-black/[0.06] cursor-pointer">
        <span class="text-lg">💬</span><span class="text-base text-black/80">对话</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" opacity="0.8"/><circle cx="10" cy="10" r="3" fill="currentColor" opacity="0.8"/></svg>
        <span class="text-base text-black/80">助手</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <span class="text-lg">🔗</span><span class="text-base text-black/80">设备互联</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <span class="text-lg">📄</span><span class="text-base text-black/80">资料</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <span class="text-lg">⚙️</span><span class="text-base text-black/80">设置</span>
      </div>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="flex-1 flex flex-col min-w-0 bg-transparent relative">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 relative z-30">
      <h1 class="text-[22px] font-semibold text-black">MiClaw</h1>
      <button id="agent-status-btn" class="flex items-center gap-2 text-[13px] text-black/40 hover:text-black/60 transition-colors cursor-pointer rounded-lg px-2.5 py-1.5 hover:bg-black/[0.04]">
        <span class="size-2 rounded-full bg-[#35C759]"></span>
        4 个设备 Bot 在线
        <svg class="size-3 text-black/30 transition-transform duration-200" id="agent-chevron" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Agent Popover -->
    <div id="agent-popover" class="absolute right-6 top-[56px] z-50 w-[320px] hidden">
      <div class="glass rounded-2xl border border-white/60 shadow-[0_8px_40px_rgba(0,0,0,0.10),0_1px_3px_rgba(0,0,0,0.06)] overflow-hidden" style="animation: popoverIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards;">
        <div class="px-4 pt-4 pb-2">
          <div class="flex items-center justify-between">
            <span class="text-[11px] font-semibold text-black/40 uppercase tracking-wider">Device Bots</span>
            <span class="text-[11px] text-black/30">4 / 4 在线</span>
          </div>
        </div>
        <div class="px-2 pb-2 flex flex-col gap-0.5">
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#6366f1] to-[#8b5cf6] flex items-center justify-center text-base shadow-sm mt-0.5">💻</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-PC</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">重算力</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 空闲中</div></div></div>
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#06b6d4] to-[#10b981] flex items-center justify-center text-base shadow-sm mt-0.5">📱</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-Phone</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">相册/传感器</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 空闲中</div></div></div>
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#f59e0b] to-[#ef4444] flex items-center justify-center text-base shadow-sm mt-0.5">🚗</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-Car</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">导航/车控</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 空闲中</div></div></div>
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#ec4899] to-[#a855f7] flex items-center justify-center text-base shadow-sm mt-0.5">📋</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-Pad</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">手写笔/大屏</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 空闲中</div></div></div>
        </div>
      </div>
    </div>

    <!-- Chat Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto scrollbar-thin px-6 py-4 flex flex-col gap-6"></div>

    <!-- Input Area -->
    <div class="px-6 pb-6 pt-2">
      <div class="bg-white rounded-2xl px-5 py-3.5 flex items-center gap-3 shadow-[0_1px_4px_rgba(0,0,0,0.06)]">
        <input id="chat-input" type="text" placeholder="输入消息..." class="flex-1 outline-none text-[15px] text-black bg-transparent placeholder:text-black/25 min-w-0">
        <button class="size-9 rounded-full bg-black flex items-center justify-center shrink-0 hover:bg-black/80 transition-colors cursor-pointer">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L8 3.5L13 8.5M8 3.5V13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
var chatMessages = document.getElementById('chat-messages');
var agentBtn = document.getElementById('agent-status-btn');
var agentPopover = document.getElementById('agent-popover');
var agentChevron = document.getElementById('agent-chevron');

// Popover
var popoverOpen = false;
agentBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  popoverOpen = !popoverOpen;
  agentPopover.classList.toggle('hidden', !popoverOpen);
  agentChevron.style.transform = popoverOpen ? 'rotate(180deg)' : '';
});
document.addEventListener('click', function(e) {
  if (popoverOpen && !agentPopover.contains(e.target) && !agentBtn.contains(e.target)) {
    popoverOpen = false; agentPopover.classList.add('hidden'); agentChevron.style.transform = '';
  }
});

// Helpers
function loadingIndicator(text) {
  return '<div class="flex items-center gap-2 text-[13px] text-black/40 mb-1"><svg class="size-3.5 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.2"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg><span>' + text + '</span></div>';
}
function thinkingDone(text) {
  return '<div class="flex items-center gap-1.5 text-[13px] text-[#10b981] mb-1"><span>✦</span><span>' + text + '</span></div>';
}
function userBubble(text) {
  return '<div class="flex justify-end w-full animate-fade-in"><div class="bg-[#d1e3ff] rounded-[20px] px-5 py-4 max-w-[70%]"><p class="text-base text-black">' + text + '</p></div></div>';
}
function pcBubble(content) {
  return '<div class="flex items-start gap-3 w-full animate-slide-up">'
    + '<div class="shrink-0 size-10 rounded-full bg-gradient-to-br from-[#6366f1] to-[#8b5cf6] flex items-center justify-center text-lg shadow-sm">💻</div>'
    + '<div class="flex flex-col gap-1.5 max-w-[80%]">'
    + '<span class="text-sm text-black/50">💻 MiClaw-PC</span>'
    + '<div class="rounded-[20px] text-base text-black">' + content + '</div>'
    + '</div></div>';
}

var photoUrls = [
  'https://images.unsplash.com/photo-1668900030471-170e936b201a?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400',
  'https://images.unsplash.com/photo-1683041133830-e781d3283991?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400',
  'https://images.unsplash.com/photo-1625749670846-8d5629e85a01?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400',
  'https://images.unsplash.com/photo-1693358521821-d115c4224a38?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400'
];
function photoGrid() {
  var imgs = photoUrls.map(function(url) {
    return '<div class="rounded-xl overflow-hidden aspect-square bg-gray-100"><img src="' + url + '" alt="风景照片" class="w-full h-full object-cover" onerror="this.outerHTML=\'<div class=\\\'flex items-center justify-center w-full h-full text-2xl text-black/20\\\'>🖼️</div>\'"></div>';
  }).join('');
  return '<div class="grid grid-cols-2 gap-2 mt-3 w-[360px]">' + imgs + '</div>';
}

function xiaohongshuCard() {
  var tags = ['#旅行日记','#风景摄影','#治愈系','#说走就走的旅行','#周末去哪儿','#自然风光'];
  var tagsHtml = tags.map(function(t){ return '<span class="text-[13px] text-[#2563eb] opacity-80">' + t + '</span>'; }).join(' ');
  return '<div class="mt-3 w-full max-w-[520px]">'
    + '<div class="bg-black/[0.03] rounded-2xl p-5 border border-black/[0.06]">'
    + '<h3 class="text-lg text-black mb-3">🏔️ 一场说走就走的旅行｜治愈系风景合集</h3>'
    + '<p class="text-[15px] text-black/70 leading-relaxed mb-3 whitespace-pre-line">'
    + '昨天趁着好天气出去走走 📸\n山川湖海、森林小径，每一帧都是大自然的馈赠～\n\n'
    + '🌿 穿过森林的光影，听风吹过树梢\n🌊 站在海边看日落，心情瞬间被治愈\n🏞️ 湖面倒映着远山，美得像一幅画\n\n'
    + '有时候不需要目的地，走出去就是最好的旅行 ✨</p>'
    + '<div class="flex flex-wrap gap-1.5">' + tagsHtml + '</div></div>'
    + '<div class="flex items-center gap-3 mt-4 justify-end">'
    + '<button class="px-5 py-2 rounded-full border border-black/15 text-sm text-black/70 bg-white hover:bg-black/[0.03] transition-colors cursor-pointer">修改文案</button>'
    + '<button class="px-5 py-2 rounded-full bg-[#3482ff] text-sm text-white hover:bg-[#2b6ee6] transition-colors cursor-pointer shadow-sm" id="publish-btn">确认发布</button>'
    + '</div></div>';
}

// --- Main session flow: user → PC result directly ---
var steps = [
  { delay: 600, render: function() { return userBubble('帮我找一下我昨天拍的照片，写一篇小红书游记'); }},
  { delay: 1800, render: function() { return pcBubble(loadingIndicator('正在处理...')); }},
  { delay: 4500, render: function() {
    return pcBubble(
      thinkingDone('任务完成')
      + '<div class="leading-relaxed">'
      + '<p>已从手机相册找到 4 张昨天拍摄的风景照，并生成了小红书游记草稿：</p>'
      + photoGrid()
      + xiaohongshuCard()
      + '</div>'
    );
  }}
];

// --- Publish flow ---
var publishTriggered = false;
function runPublishFlow() {
  if (publishTriggered) return;
  publishTriggered = true;
  var btn = document.getElementById('publish-btn');
  if (btn) {
    btn.disabled = true;
    btn.className = 'px-5 py-2 rounded-full bg-black/20 text-sm text-white/60 cursor-not-allowed shadow-sm';
    btn.textContent = '发布中...';
  }
  var pubSteps = [
    { delay: 800, render: function() { return pcBubble(loadingIndicator('正在调度手机端发布...')); }},
    { delay: 3500, render: function() {
      return pcBubble(
        thinkingDone('发布成功')
        + '<div class="leading-relaxed">'
        + '<p>游记已成功发布到小红书 🎉</p>'
        + '<div class="mt-3 bg-black/[0.03] rounded-2xl p-4 border border-black/[0.06]">'
        + '<div class="flex items-center gap-2 mb-2"><span class="size-2 rounded-full bg-[#35C759]"></span><span class="text-[13px] text-black/60">发布状态：已发布</span></div>'
        + '<div class="text-[13px] text-black/50 leading-relaxed">'
        + '📝 标题：一场说走就走的旅行｜治愈系风景合集<br>'
        + '🖼️ 图片：4 张已上传<br>'
        + '🏷️ 标签：6 个已添加<br>'
        + '🔗 链接：<span class="text-[#2563eb] underline cursor-pointer">xiaohongshu.com/explore/abc123</span>'
        + '</div></div></div>'
      );
    }}
  ];
  var rendered = [];
  pubSteps.forEach(function(step, i) {
    setTimeout(function() {
      if (i === 1 && rendered[0]) { rendered[0].remove(); rendered[0] = null; }
      var div = document.createElement('div');
      div.innerHTML = step.render();
      chatMessages.appendChild(div);
      rendered[i] = div;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, step.delay);
  });
}
document.addEventListener('click', function(e) {
  if (e.target && e.target.id === 'publish-btn') runPublishFlow();
});

// Run main steps
function runSteps() {
  var rendered = [];
  steps.forEach(function(step, i) {
    setTimeout(function() {
      if (i === 2 && rendered[1]) { rendered[1].remove(); rendered[1] = null; }
      var div = document.createElement('div');
      div.innerHTML = step.render();
      chatMessages.appendChild(div);
      rendered[i] = div;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, step.delay);
  });
}
runSteps();
</script>
</body>
</html>
