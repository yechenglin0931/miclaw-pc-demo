<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>睡觉场景 Step 1 — 门店首屏</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a}

.vp{
  width:393px;height:852px;
  transform-origin:top left;
  position:absolute;top:0;left:0;
  background:#000;
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  display:flex;flex-direction:column;
  overflow:hidden;
}

.bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(99,102,241,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(139,92,246,0.1) 0%, transparent 50%),
    #07070d;
}

.status-bar{
  position:relative;z-index:2;
  height:54px;
  display:flex;align-items:flex-end;padding:0 24px 8px;
  justify-content:space-between;
  font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);
}
.status-bar .right{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.5)}

/* 整个主体垂直居中 */
.body{
  position:relative;z-index:2;
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:56px;
  padding-bottom:60px;
}

/* 打招呼 */
.hero{
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:0 40px;
}
.ai-logo{
  width:80px;height:80px;
  border-radius:22px;
  overflow:hidden;
}
.ai-logo img{
  width:100%;height:100%;
  object-fit:contain;
}

.hero-text{
  font-size:30px;
  font-weight:700;
  color:rgba(255,255,255,0.95);
  line-height:1.4;
  letter-spacing:-0.3px;
}
.hero-text .soft{
  color:rgba(255,255,255,0.3);
  font-weight:400;
}

/* 语音按钮 */
.mic-area{
  display:flex;flex-direction:column;align-items:center;gap:16px;
}

.mic-btn{
  width:88px;height:88px;
  border-radius:50%;
  background:linear-gradient(135deg, #6366f1, #8b5cf6);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  position:relative;
  transition:transform 0.2s ease;
}
.mic-btn:active{transform:scale(0.93)}

/* 呼吸光环 */
.mic-btn::before{
  content:'';position:absolute;
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg, #6366f1, #8b5cf6);
  opacity:0.3;
  animation:breathe 2.5s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.25);opacity:0}
}

.mic-btn svg{
  position:relative;z-index:1;
  width:36px;height:36px;
  fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}

.mic-label{
  font-size:14px;
  color:rgba(255,255,255,0.3);
  font-weight:400;
  letter-spacing:0.5px;
}

/* 底部 home indicator */
.home-indicator{
  position:absolute;bottom:8px;left:0;right:0;
  z-index:2;
  display:flex;justify-content:center;
}
.home-indicator span{
  width:134px;height:5px;border-radius:3px;
  background:rgba(255,255,255,0.15);
}
</style>
</head>
<body>
<div class="vp" id="vp">
  <div class="bg"></div>

  <div class="status-bar">
    <span>21:36</span>
    <div class="right">
      <span>●●●●○</span>
      <span>WiFi</span>
      <span>87%</span>
    </div>
  </div>

  <div class="body">
    <div class="hero">
      <div class="ai-logo">
        <img src="miclaw-logo.png" alt="MiClaw">
      </div>
      <div class="hero-text">
        Hello，你好呀 👋<br>
        <span class="soft">你希望我怎么称呼你？</span>
      </div>
    </div>

    <div class="mic-area">
      <div class="mic-btn">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="1" width="6" height="12" rx="3"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
          <line x1="12" y1="18" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div class="mic-label">点击开始体验</div>
    </div>
  </div>

  <div class="home-indicator"><span></span></div>
</div>
<script>
function fit(){
  var vp=document.getElementById('vp');
  var s=Math.min(window.innerWidth/393,window.innerHeight/852);
  vp.style.transform='scale('+s+')';
}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
