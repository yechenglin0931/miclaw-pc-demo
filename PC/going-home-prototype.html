<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiClaw - 回家场景</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popoverIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes progressPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
  .animate-fade-in { animation: fadeIn 0.4s ease-out; }
  .animate-slide-up { animation: slideUp 0.5s ease-out; }
  .animate-spin { animation: spin 1s linear infinite; }
  .scrollbar-thin::-webkit-scrollbar { width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
  .glass {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
  }
  .system-notice { display: flex; justify-content: center; width: 100%; }
  .system-notice-inner {
    background: rgba(0,0,0,0.04); border-radius: 20px; padding: 6px 16px;
    font-size: 13px; color: rgba(0,0,0,0.35);
  }
  .like-row { display: flex; gap: 4px; margin-top: 6px; }
  .like-btn {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(0,0,0,0.04); border-radius: 20px; padding: 3px 10px;
    font-size: 12px; color: rgba(0,0,0,0.4); cursor: default;
  }
  .like-btn.active { background: rgba(59,130,246,0.08); color: #3b82f6; }
  .monitor-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.15);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: #b45309;
  }
  .action-card {
    background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06);
    border-radius: 16px; padding: 14px 18px; margin-top: 10px;
  }
  .action-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; font-size: 14px; color: rgba(0,0,0,0.6);
  }
  .action-item .check { color: #10b981; font-size: 16px; }
  .action-item.pending .check { color: rgba(0,0,0,0.15); }
  .welcome-card {
    background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(236,72,153,0.06));
    border: 1px solid rgba(245,158,11,0.12);
    border-radius: 16px; padding: 18px 20px; margin-top: 10px;
  }
</style>
</head>
<body class="bg-[#f2f2f2] h-screen overflow-hidden">
<div id="app" class="size-full flex overflow-hidden p-0 md:p-4 gap-0 md:gap-5">

  <!-- Sidebar -->
  <div class="bg-white h-full rounded-none md:rounded-[44px] w-[280px] shrink-0 flex-col p-5 hidden md:flex">
    <div class="flex items-center gap-2 px-3 pt-2 pb-6">
      <div class="size-3 rounded-full bg-[#FF5C60] border border-black/10"></div>
      <div class="size-3 rounded-full bg-[#FAC800] border border-black/10"></div>
      <div class="size-3 rounded-full bg-[#35C759] border border-black/10"></div>
    </div>
    <div class="flex flex-col gap-0.5">
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <span class="text-lg">💬</span><span class="text-base text-black/80">对话</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" opacity="0.8"/><circle cx="10" cy="10" r="3" fill="currentColor" opacity="0.8"/></svg>
        <span class="text-base text-black/80">助手</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-black/[0.06] cursor-pointer">
        <span class="text-lg">🔗</span><span class="text-base text-black/80">设备互联</span>
        <span class="ml-auto size-5 rounded-full bg-[#FF3B30] text-white text-[11px] flex items-center justify-center font-medium" id="unread-badge" style="display:none">1</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <span class="text-lg">📄</span><span class="text-base text-black/80">资料</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-black/[0.03] cursor-pointer transition-colors">
        <span class="text-lg">⚙️</span><span class="text-base text-black/80">设置</span>
      </div>
    </div>
  </div>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col min-w-0 bg-transparent relative">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 relative z-30">
      <div class="flex items-center gap-3">
        <h1 class="text-[22px] font-semibold text-black">设备互联</h1>
        <div class="monitor-badge">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          监控模式
        </div>
      </div>
      <button id="agent-status-btn" class="flex items-center gap-2 text-[13px] text-black/40 hover:text-black/60 transition-colors cursor-pointer rounded-lg px-2.5 py-1.5 hover:bg-black/[0.04]">
        <span class="size-2 rounded-full bg-[#35C759]"></span>
        4 个设备 Bot 在线
        <svg class="size-3 text-black/30 transition-transform duration-200" id="agent-chevron" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Agent Popover -->
    <div id="agent-popover" class="absolute right-6 top-[56px] z-50 w-[320px] hidden">
      <div class="glass rounded-2xl border border-white/60 shadow-[0_8px_40px_rgba(0,0,0,0.10),0_1px_3px_rgba(0,0,0,0.06)] overflow-hidden" style="animation: popoverIn 0.25s cubic-bezier(0.16,1,0.3,1) forwards;">
        <div class="px-4 pt-4 pb-2">
          <div class="flex items-center justify-between">
            <span class="text-[11px] font-semibold text-black/40 uppercase tracking-wider">Device Bots</span>
            <span class="text-[11px] text-black/30">4 / 4 在线</span>
          </div>
        </div>
        <div class="px-2 pb-2 flex flex-col gap-0.5">
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#6366f1] to-[#8b5cf6] flex items-center justify-center text-base shadow-sm mt-0.5">💻</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-PC</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">重算力</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 空闲中</div></div></div>
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#06b6d4] to-[#10b981] flex items-center justify-center text-base shadow-sm mt-0.5">📱</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-Phone</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">相册/传感器</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 空闲中</div></div></div>
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#f59e0b] to-[#ef4444] flex items-center justify-center text-base shadow-sm mt-0.5">🚗</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">MiClaw-Car</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">导航/车控</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 正在行驶</div></div></div>
          <div class="flex items-start gap-3 px-3 py-3"><div class="shrink-0 size-9 rounded-full bg-gradient-to-br from-[#f97316] to-[#facc15] flex items-center justify-center text-base shadow-sm mt-0.5">🏠</div><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="size-[6px] rounded-full bg-[#35C759] shrink-0"></span><span class="text-[13px] font-medium text-black/80">米家 Agent</span><span class="text-[10px] text-black/30 border border-black/10 rounded px-1.5 leading-[18px]">智能家居</span></div><div class="mt-1.5 text-[12px] text-black/40">在线 · 待命中</div></div></div>
        </div>
      </div>
    </div>

    <!-- Chat Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto scrollbar-thin px-6 py-4 flex flex-col gap-5"></div>

    <!-- Disabled Input -->
    <div class="px-6 pb-6 pt-2">
      <div class="bg-white/60 rounded-2xl px-5 py-3.5 flex items-center gap-3 border border-black/[0.06]">
        <span class="flex-1 text-[15px] text-black/25 select-none">监控模式下无法发送消息</span>
        <div class="size-9 rounded-full bg-black/10 flex items-center justify-center shrink-0 cursor-not-allowed">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L8 3.5L13 8.5M8 3.5V13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const chatMessages = document.getElementById('chat-messages');
const agentBtn = document.getElementById('agent-status-btn');
const agentPopover = document.getElementById('agent-popover');
const agentChevron = document.getElementById('agent-chevron');

// Popover toggle
let popoverOpen = false;
agentBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  popoverOpen = !popoverOpen;
  agentPopover.classList.toggle('hidden', !popoverOpen);
  agentChevron.style.transform = popoverOpen ? 'rotate(180deg)' : '';
});
document.addEventListener('click', function(e) {
  if (popoverOpen && !agentPopover.contains(e.target) && !agentBtn.contains(e.target)) {
    popoverOpen = false;
    agentPopover.classList.add('hidden');
    agentChevron.style.transform = '';
  }
});

// Bot config
const bots = {
  car:   { emoji: '🚗', name: 'MiClaw-Car',   gradient: 'from-[#f59e0b] to-[#ef4444]' },
  phone: { emoji: '📱', name: 'MiClaw-Phone',  gradient: 'from-[#06b6d4] to-[#10b981]' },
  home:  { emoji: '🏠', name: '米家 Agent',     gradient: 'from-[#f97316] to-[#facc15]' },
  sound: { emoji: '🔊', name: 'Sound 2 Pro',   gradient: 'from-[#8b5cf6] to-[#6366f1]' }
};

function avatarHtml(type) {
  var b = bots[type];
  return '<div class="shrink-0 size-10 rounded-full bg-gradient-to-br ' + b.gradient + ' flex items-center justify-center text-lg shadow-sm">' + b.emoji + '</div>';
}
function nameHtml(type) {
  var b = bots[type];
  return '<span class="text-sm font-medium text-black/60">' + b.emoji + ' ' + b.name + '</span>';
}
function mention(name) {
  return '<span class="inline-flex items-center bg-[#d1e3ff] text-[#2563eb] rounded-full px-2.5 py-0.5 mx-0.5 text-sm whitespace-nowrap">@' + name + '</span>';
}
function systemNotice(text) {
  return '<div class="system-notice animate-fade-in"><div class="system-notice-inner">' + text + '</div></div>';
}
function loadingIndicator(text) {
  return '<div class="flex items-center gap-2 text-[13px] text-black/40 mb-1"><svg class="size-3.5 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.2"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg><span>' + text + '</span></div>';
}
function thinkingDone(text) {
  return '<div class="flex items-center gap-1.5 text-[13px] text-[#10b981] mb-1"><span>✦</span><span>' + text + '</span></div>';
}

function botBubble(type, content, extra) {
  extra = extra || '';
  return '<div class="flex items-start gap-3 w-full animate-slide-up">'
    + avatarHtml(type)
    + '<div class="flex flex-col gap-1 max-w-[80%]">'
    + nameHtml(type)
    + '<div class="bg-white rounded-[20px] px-4 py-3 text-[15px] text-black leading-relaxed shadow-[0_1px_3px_rgba(0,0,0,0.04)]">'
    + content + '</div>'
    + extra
    + '</div></div>';
}

function likeRow(likers) {
  var html = '<div class="like-row animate-fade-in">';
  likers.forEach(function(l) { html += '<span class="like-btn active">' + bots[l].emoji + ' 👍</span>'; });
  html += '</div>';
  return html;
}

function actionCard(items) {
  var html = '<div class="action-card animate-fade-in">';
  html += '<div class="text-[11px] text-black/30 uppercase tracking-wider mb-2">执行清单</div>';
  items.forEach(function(item) {
    html += '<div class="action-item"><span class="check">✅</span><span>' + item + '</span></div>';
  });
  html += '</div>';
  return html;
}

// --- Timeline ---
var steps = [
  // Scene: owner gets in car
  { delay: 800, render: function() {
    return systemNotice('🚗 检测到车主上车，MiClaw-Car 触发「回家」场景');
  }},

  // Car → Phone: owner is heading home
  { delay: 2500, render: function() {
    return botBubble('car', mention('MiClaw-Phone') + ' 主人上车了，马上回家 🏠 预计 15 分钟到。你那边看看今天日程怎么样，帮他安排一下到家的节奏～');
  }},

  // Phone reads calendar, reports to group
  { delay: 5000, render: function() {
    return botBubble('phone', loadingIndicator('正在读取日历...'));
  }},

  { delay: 7500, render: function() {
    return botBubble('phone',
      thinkingDone('日历分析完成')
      + '<div class="leading-relaxed">'
      + mention('米家 Agent') + ' 今天主人开了一天的会，日程排得满满当当 😮‍💨 回家给他来点放松的环境吧，辛苦一天了～'
      + '</div>'
    );
  }},

  // Home agent receives task
  { delay: 10000, render: function() {
    return botBubble('home', '收到！放松模式安排上 🫡 ' + mention('MiClaw-Car') + ' 距离回家 3 分钟的时候通知我一声，我好提前准备～');
  }},

  // Car approaching
  { delay: 13000, render: function() {
    return botBubble('car', mention('米家 Agent') + ' 还有 1 公里，正在等红灯，可以干活了！🚦', likeRow(['home']));
  }},

  // Home agent executing - loading
  { delay: 15500, render: function() {
    return botBubble('home', loadingIndicator('正在准备家居环境...'));
  }},

  // Home agent done - action list
  { delay: 19000, render: function() {
    return botBubble('home',
      thinkingDone('家居环境准备就绪')
      + '<div class="leading-relaxed">全部搞定，就等主人进门了 ✨</div>'
      + actionCard([
        '🤖 扫地机器人已停回基站',
        '🌬️ 新风机已关闭，窗帘已拉上',
        '❄️ 空调已调至 23°C 制冷模式',
        '🚿 卫生间浴霸已开启、热水器已预热',
        '💡 全屋灯光调至暖色温低亮度',
      ])
    );
  }},

  // System: owner arrives
  { delay: 22500, render: function() {
    return systemNotice('🚪 检测到主人到家，智能门锁已开启');
  }},

  // Home agent: welcome + sound
  { delay: 25000, render: function() {
    return botBubble('home',
      '<div class="leading-relaxed">门开了！已启动 Xiaomi Sound 2 Pro 🔊</div>'
      + '<div class="welcome-card">'
      + '<div class="text-[15px] text-black/70 leading-relaxed">'
      + '🎵 <span class="italic text-black/50">正在播放欢迎语...</span><br><br>'
      + '"欢迎回来～今天一天辛苦了 ☺️ 已经帮你把热水器打开了，可以先洗个热水澡。你喜欢的歌单已经准备好，洗完就开始播放 🎶"'
      + '</div></div>'
    );
  }},

  // Phone wraps up
  { delay: 28000, render: function() {
    return botBubble('phone', '主人到家啦～我先静音了，有事再叫我 😴 大家辛苦！');
  }},

  // Car signs off
  { delay: 30000, render: function() {
    return botBubble('car', '车已锁好，充电桩已连接 🔌 今天跑了 47 公里，明早 8 点前能充满。我也休息了，晚安各位 🌙');
  }},

  // System
  { delay: 32000, render: function() {
    return systemNotice('「回家」场景执行完毕 · 4 个设备协作 · 耗时 3 分 12 秒 ✅');
  }}
];

// Run with loading→final replacement
function runSteps() {
  var rendered = [];
  steps.forEach(function(step, i) {
    setTimeout(function() {
      // Replace loading steps: step 2→3, step 6→7
      if (i === 3 && rendered[2]) { rendered[2].remove(); rendered[2] = null; }
      if (i === 7 && rendered[6]) { rendered[6].remove(); rendered[6] = null; }
      var html = step.render();
      if (html) {
        var div = document.createElement('div');
        div.innerHTML = html;
        chatMessages.appendChild(div);
        rendered[i] = div;
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, step.delay);
  });
}

runSteps();
</script>
</body>
</html>
